<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試評分系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        
        /* 評分按鈕與提示 */
        .score-btn { transition: all 0.15s; cursor: pointer; border: 1px solid #cbd5e1; background-color: white; position: relative; }
        .score-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .score-btn.active { transform: scale(1.05); border-width: 2px; }
        .score-btn.active[data-val="1"] { background-color: #ef4444; color: white; border-color: #b91c1c; }
        .score-btn.active[data-val="2"] { background-color: #f97316; color: white; border-color: #c2410c; }
        .score-btn.active[data-val="3"] { background-color: #eab308; color: white; border-color: #a16207; }
        .score-btn.active[data-val="4"] { background-color: #84cc16; color: white; border-color: #4d7c0f; }
        .score-btn.active[data-val="5"] { background-color: #22c55e; color: white; border-color: #15803d; }
        
        /* Tooltip */
        .tooltip-text { visibility: hidden; opacity: 0; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background-color: #1e293b; color: white; text-align: center; padding: 4px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 10; transition: opacity 0.2s; pointer-events: none; }
        .score-btn:hover .tooltip-text { visibility: visible; opacity: 1; }

        .input-cell { @apply w-full border border-slate-300 rounded p-1.5 text-sm focus:ring-2 focus:ring-blue-400 outline-none resize-none transition-all; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 決策按鈕 */
        .decision-btn { transition: all 0.2s; border: 2px solid transparent; }
        .decision-btn.active-pass { background-color: #ecfdf5; border-color: #10b981; color: #047857; transform: scale(1.02); }
        .decision-btn.active-fail { background-color: #fef2f2; border-color: #ef4444; color: #b91c1c; transform: scale(1.02); }

        /* Toast 通知 */
        #toast { position: fixed; top: 80px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateX(150%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; }
        #toast.show { transform: translateX(0); }

        /* ================= 列印 / 報告模式 CSS ================= */
        .report-label { display: none; } /* 正常模式下隱藏中文標籤 */
        
        body.report-mode { background-color: white; }
        body.report-mode .hide-in-report { display: none !important; }
        body.report-mode input, body.report-mode textarea, body.report-mode select { border: none !important; background: transparent !important; appearance: none; -webkit-appearance: none; pointer-events: none; resize: none; padding: 0 !important; color: #0f172a !important; font-weight: 500; }
        body.report-mode .shadow-sm, body.report-mode .shadow-md, body.report-mode .shadow-lg, body.report-mode .shadow-xl { box-shadow: none !important; }
        body.report-mode section { border: 1px solid #e2e8f0; margin-bottom: 16px; border-radius: 8px; break-inside: avoid; }
        
        /* 報告模式下的分數按鈕切換 */
        body.report-mode .score-btn:not(.active) { display: none !important; }
        body.report-mode .score-btn.active { transform: none !important; cursor: default; width: auto !important; padding: 2px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; box-shadow: none !important; }
        
        /* 階段一與階段二特殊標籤切換 (優異5, 良好4...) */
        body.report-mode .s1-s2-btn .btn-num { display: none !important; }
        body.report-mode .s1-s2-btn .report-label { display: inline-block !important; }

        /* 隱藏未選擇的決策按鈕 */
        body.report-mode .decision-btn:not([class*="active-"]) { display: none !important; }
        body.report-mode .decision-btn { padding: 8px 16px !important; pointer-events: none; }
        
        @media print {
            .no-print { display: none !important; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            @page { margin: 1cm; }
        }
    </style>
</head>
<body class="text-slate-800 pb-40">

    <div id="toast">✅ 操作成功！</div>

    <header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50 border-b-2 border-blue-500 no-print">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-black tracking-wider">面試評分系統</h1>
            <div class="text-right flex items-center gap-4 bg-slate-800 px-4 py-1 rounded-lg border border-slate-700 shadow-inner">
                <span class="text-sm text-slate-400 font-bold hidden md:inline">總得分</span>
                <span id="header-total" class="text-2xl md:text-3xl font-black text-blue-400 drop-shadow-md">0.00</span>
            </div>
        </div>
    </header>

    <div id="report-exit-bar" class="hidden fixed top-0 left-0 w-full bg-blue-600 text-white p-3 z-[60] flex justify-between items-center no-print shadow-lg">
        <span class="font-bold ml-4">📄 報告預覽模式 (列印/下載 PDF)</span>
        <button onclick="toggleReportMode(false)" class="bg-white text-blue-600 px-4 py-1.5 rounded-lg font-bold hover:bg-blue-50 mr-4">返回編輯模式</button>
    </div>

    <main class="container mx-auto p-4 max-w-[1400px] mt-4 space-y-6">

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-800 p-3 border-b border-slate-700">
                <h2 class="text-white font-bold flex items-center gap-2 text-lg">面試基本資訊</h2>
            </div>
            <div class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-1">應徵者姓名</label>
                    <input type="text" class="w-full border-b-2 border-slate-200 p-2 focus:border-blue-500 outline-none bg-slate-50 transition-all text-lg font-bold">
                </div>
                <div class="row-span-2">
                    <label class="block text-sm font-bold text-slate-400 mb-1 flex justify-between items-center">
                        面試官姓名
                        <button onclick="addInterviewer()" class="hide-in-report bg-blue-50 text-blue-600 hover:bg-blue-100 px-2 py-1 rounded text-xs flex items-center gap-1 font-bold">增加人員</button>
                    </label>
                    <div id="interviewer-list" class="space-y-3">
                        <div class="flex gap-2"><input type="text" class="flex-1 border-b-2 border-slate-200 p-2 text-lg focus:border-blue-500 outline-none bg-slate-50"></div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-1">應徵分校</label>
                    <select class="w-full border-b-2 border-slate-200 p-2 focus:border-blue-500 outline-none bg-slate-50 text-lg font-bold">
                        <option value="">請選擇...</option>
                        <option>青埔翱翔校</option><option>青園展翅校</option><option>大園晨光校</option>
                        <option>內壢森耀校</option><option>竹北知行校</option><option>文化極光校</option>
                        <option>快樂騰雲校</option><option>大園參天校</option><option>園中方舟校</option>
                        <option>青埔旭日校</option><option>中壢心夢想校</option><option>青埔升大校</option>
                        <option>行政溝通處</option><option>人力資源處</option><option>財務會計處</option>
                        <option>國小事業處</option><option>國高中事業處</option><option>產品研發處</option>
                        <option>品牌行銷處</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-1">應徵職位</label>
                    <select class="w-full border-b-2 border-slate-200 p-2 focus:border-blue-500 outline-none bg-slate-50 text-lg font-bold">
                        <option value="">請選擇...</option>
                        <option>班級導師</option><option>行政導師</option><option>授課師</option>
                        <option>主任</option><option>處長</option><option>總部</option>
                    </select>
                </div>
                <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                    <div>
                        <label class="block text-xs font-bold text-blue-800 mb-1">面試日期</label>
                        <input type="date" id="interview-date" onchange="updateDateTimeDisplay()" class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-blue-800 mb-1">開始時間</label>
                        <input type="time" id="interview-time" onchange="updateDateTimeDisplay()" class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none">
                    </div>
                    <div class="sm:col-span-2">
                        <div id="datetime-preview" class="mt-1 text-sm font-black text-blue-700 tracking-wide"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="bg-emerald-50 p-4 border-b border-emerald-100 flex justify-between items-center">
                <h2 class="text-lg font-bold text-emerald-900">1. 階段一：筆試與綜合面談 <span class="text-sm font-normal text-emerald-600 ml-2">(30%)</span></h2>
                <div class="text-sm font-bold text-emerald-700">貢獻分: <span id="s1-final" class="text-xl">0.00</span>/30</div>
            </div>
            <div class="p-6 space-y-6 bg-slate-50/30">
                <div id="s1-exp-section"></div>
                <div id="s1-mot-section"></div>
                <div id="s1-sty-section"></div>
                <div id="s1-sal-section"></div>
                <div id="s1-bon-section"></div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="bg-indigo-50 p-4 border-b border-indigo-100 flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-bold text-indigo-900">2. 階段二：外顯特質評分 <span class="text-sm font-normal text-indigo-600 ml-2">(10%)</span></h2>
                    <p class="text-xs text-indigo-700 mt-1 hide-in-report">評分基準：[5]優異、[4]良好、[3]佳、[2]尚可、[1]差</p>
                </div>
                <div class="text-sm font-bold text-indigo-700">貢獻分: <span id="s2-final" class="text-xl">0.00</span>/10</div>
            </div>
            <div class="p-5 grid grid-cols-1 lg:grid-cols-2 gap-x-8 gap-y-1" id="s2-container"></div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="bg-orange-50 p-4 border-b border-orange-200 flex justify-between items-center">
                <h2 class="text-lg font-bold text-orange-900">3. 階段三：職能評估 <span class="text-sm font-normal text-orange-600 ml-2">(60%)</span></h2>
                <div class="flex items-center gap-4">
                    <select id="job-level-select" class="border rounded outline-none font-bold text-sm p-1 hide-in-report" onchange="updateLevelLogic()">
                        <option value="1">職等 1 (核心90% / 管理10%)</option>
                        <option value="2">職等 2 (核心85% / 管理15%)</option>
                        <option value="3">職等 3 (核心70% / 管理30%)</option>
                        <option value="4">職等 4 (核心60% / 管理40%)</option>
                        <option value="5">職等 5 (核心50% / 管理50%)</option>
                        <option value="6">職等 6 (核心40% / 管理60%)</option>
                        <option value="7">職等 7 (核心30% / 管理70%)</option>
                    </select>
                    <div class="text-sm font-bold text-orange-700">貢獻分: <span id="s3-final" class="text-xl">0.00</span>/60</div>
                </div>
            </div>

            <div class="p-0 overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse min-w-[1100px]">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 text-sm text-center">
                            <th class="p-2 border border-slate-200 w-24">維度</th>
                            <th class="p-2 border border-slate-200 w-32">職能項目</th>
                            <th class="p-2 border border-slate-200 text-blue-800" width="180">BEI (問題描述)</th>
                            <th class="p-2 border border-slate-200 text-indigo-800" colspan="3">CAR (狀況 / 行動 / 結果)</th>
                            <th class="p-2 border border-slate-200 w-40">給分 (放置滑鼠看提示)</th>
                        </tr>
                    </thead>
                    <tbody id="s3-tbody"></tbody>
                </table>
            </div>
        </section>

        <section class="bg-slate-900 rounded-2xl shadow-xl p-6 md:p-8 text-white mb-8 border border-slate-700 relative">
            <h2 class="text-2xl font-black mb-6 flex items-center gap-3">面試成績總結算 (Report Card)</h2>
            <div class="bg-slate-800 p-5 rounded-xl border border-slate-600 flex justify-between items-center mb-6">
                <div>
                    <div class="text-xl font-black text-slate-200">系統最終總得分</div>
                </div>
                <div class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400" id="report-grand-total">0.00</div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-4 bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <label class="block text-slate-400 text-sm font-bold">系統建議理想狀態</label>
                    <div id="ideal-status-text" class="text-2xl font-black text-white mb-4">等待評分...</div>
                    <label class="block text-slate-400 text-sm font-bold">理想狀態判定說明</label>
                    <div id="ideal-status-exp" class="text-sm font-medium text-amber-300 bg-amber-900/30 p-3 rounded-lg border border-amber-700/50">-</div>
                </div>

                <div class="space-y-4 bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <label class="block text-slate-300 text-sm font-bold mb-2">加分方式 / 補救培訓計畫</label>
                    <div id="bonus-hint-area" class="text-xs text-amber-400 bg-amber-900/20 px-3 py-2 rounded-t-lg hidden hide-in-report"></div>
                    <textarea id="bonus-method-input" rows="3" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white text-sm focus:border-blue-500 outline-none mb-4 placeholder-slate-500" placeholder="請填寫..."></textarea>
                    
                    <label class="block text-slate-300 text-sm font-bold mb-2 hide-in-report">最終錄取結果</label>
                    <div class="flex gap-4">
                        <button id="btn-pass" onclick="setFinalDecision('pass')" class="decision-btn flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl font-black text-lg hover:bg-slate-600">✅ 確認錄取</button>
                        <button id="btn-fail" onclick="setFinalDecision('fail')" class="decision-btn flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl font-black text-lg hover:bg-slate-600">❌ 不予錄取</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="action-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-50 no-print">
        <div class="container mx-auto max-w-[1400px] flex justify-between items-center">
            <div class="text-lg font-black text-slate-800">
                總得分：<span id="footer-total" class="text-blue-700 text-2xl ml-2">0.00</span>
            </div>
            <div class="flex gap-3">
                <button onclick="saveDraft()" class="px-4 py-2 bg-slate-100 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-200 font-bold transition-colors">💾 暫存人才</button>
                <button onclick="fakeSaveBackend()" class="px-4 py-2 bg-slate-800 rounded-lg text-white hover:bg-slate-700 font-bold">☁️ 儲存到後台</button>
                <button onclick="toggleReportMode(true)" class="px-6 py-2 bg-blue-600 rounded-lg text-white hover:bg-blue-700 font-black shadow-md">📄 產出成績單</button>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function saveDraft() {
            localStorage.setItem('interviewDraft', JSON.stringify(state));
            showToast('✅ 已成功暫存人才資料於本機！');
        }

        function fakeSaveBackend() {
            showToast('☁️ 正在上傳至後台資料庫...');
            setTimeout(() => showToast('✅ 儲存成功！已完成建檔。'), 1500);
        }

        function toggleReportMode(isReport) {
            if(isReport) {
                document.body.classList.add('report-mode');
                document.getElementById('action-bar').classList.add('hidden');
                document.getElementById('report-exit-bar').classList.remove('hidden');
                window.scrollTo(0,0);
                setTimeout(() => window.print(), 500);
            } else {
                document.body.classList.remove('report-mode');
                document.getElementById('action-bar').classList.remove('hidden');
                document.getElementById('report-exit-bar').classList.add('hidden');
            }
        }

        function addInterviewer() {
            const container = document.getElementById('interviewer-list');
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `<input type="text" class="flex-1 border-b-2 border-slate-200 p-2 text-lg outline-none"><button onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">✕</button>`;
            container.appendChild(div);
        }

        function updateDateTimeDisplay() {
            const dInput = document.getElementById('interview-date').value;
            const tInput = document.getElementById('interview-time').value;
            if(!dInput) return;
            const d = new Date(dInput);
            const days = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
            const timeStr = tInput ? ` / ${tInput} 開始` : '';
            document.getElementById('datetime-preview').innerText = `${d.getFullYear()}年 / ${d.getMonth()+1}月 / ${d.getDate()}日 / ${days[d.getDay()]}${timeStr}`;
        }

        // ================= 資料庫與標籤設定 =================
        const GRADE_LABELS = ["", "差1", "尚可2", "佳3", "良好4", "優異5"];
        
        const S1_DATA = [
            { id: 'exp', title: "工作經歷", weight: 0.20, max: 5, qs: ["最能代表其專業能力及理想的經歷？"] },
            { id: 'mot', title: "動機與價值", weight: 0.35, max: 10, qs: ["與我們最契合的價值觀？", "影響個人去留的主因？"] },
            { id: 'sty', title: "工作風格", weight: 0.25, max: 10, qs: ["最滿意或欣賞的工作環境、管理制度？", "感到挫敗或壓力最大的案例？當時如何應對？"] },
            { id: 'sal', title: "薪資與期待", weight: 0.20, max: 15, qs: ["期望月薪/年薪及初期最低薪資？", "最感興趣的工作任務與職涯關聯？", "想了解或擔心的部分？"] },
            { id: 'bon', title: "特別加分題", weight: 0.01, max: 5, qs: ["補充說明？"] }
        ];

        const S2_QUESTIONS = ["儀容穿著", "禮貌應對", "表達流暢", "自信穩健", "誠懇親和", "對分校了解", "對職務認知", "企圖心展現", "配合度", "邏輯思考", "臨場反應", "學習意願", "情緒穩定", "抗壓性", "團隊合作", "經歷相關", "專業知識"];

        const S3_LEVELS = {
            1: { c: [30, 20, 20, 15, 10, 5], m: [30, 30, 40], ratio: { c: 90, m: 10 } },
            2: { c: [30, 20, 20, 15, 10, 5], m: [30, 30, 40], ratio: { c: 85, m: 15 } },
            3: { c: [20, 15, 20, 15, 15, 15], m: [30, 35, 35], ratio: { c: 70, m: 30 } },
            4: { c: [20, 15, 20, 15, 15, 15], m: [30, 40, 30], ratio: { c: 60, m: 40 } },
            5: { c: [15, 10, 20, 15, 20, 20], m: [35, 35, 30], ratio: { c: 50, m: 50 } },
            6: { c: [15, 10, 20, 15, 20, 20], m: [40, 35, 25], ratio: { c: 40, m: 60 } },
            7: { c: [15, 10, 20, 15, 20, 20], m: [40, 35, 25], ratio: { c: 30, m: 70 } }
        };

        const S3_BARS_CORE = [
            { name: "品質成果導向", levels: ["逃避責任", "被動執行", "穩定執行", "主動精進", "卓越引領"], descs: ["經常拖延，需多次提醒才執行；遇問題傾向抱怨，品質不穩。","僅完成明確指示，缺乏自我檢查；需主管持續監督。","理解任務並依計畫執行；遇困難主動回報，品質大致穩定。","清楚拆解目標並優化流程；面對挑戰能分析並協調資源，具高責任感。","高度自我要求，帶領他人檢視改進；建立標準化機制與信任文化。"] },
            { name: "顧客導向", levels: ["忽視需求", "被動回應", "穩定服務", "主動協助", "建立信任"], descs: ["對家長反應漠不關心，傾向以規則回應，不願理解對方焦慮。","僅被詢問時回覆；面對抱怨易緊張防禦，缺乏安撫技巧。","能友善回覆，並在指導下處理簡單抱怨；維持禮貌與穩定。","察覺家長焦慮並主動關懷，提供具體協助；平衡雙方期待。","化解負面情緒並建立信任，帶領團隊形成穩定服務文化。"] },
            { name: "問題解決", levels: ["逃避問題", "被動回報", "穩定修正", "主動分析", "系統改善"], descs: ["面對問題閃避或推卸責任，缺乏改善行動。","察覺問題但僅通報主管，未嘗試分析或提出方案。","在指導下釐清問題，提出可行修正並完成任務。","獨立找出根源、提出並執行方案，追蹤結果防止重複。","整合團隊經驗建立SOP，推動持續改善與風險預警。"] },
            { name: "團隊合作", levels: ["抗拒合作", "被動配合", "穩定參與", "主動支援", "領導團隊"], descs: ["缺乏團隊意識，只顧自身任務，對他人需求漠不關心。","願意合作但僅在被要求時行動，難以主動協助。","理解目標並完成分配任務，衝突時保持理性尊重。","協調不同意見、推動共識，主動分享經驗協助同儕。","帶領團隊形成穩定機制，推動跨部門協作建立信任。"] },
            { name: "溝通協調", levels: ["表達混亂", "被動回應", "清楚表達", "彈性調整", "影響引導"], descs: ["溝通缺乏邏輯或情緒化，易造成誤會或衝突。","單向表達未確認對方理解；常需他人重複解釋。","條理說明工作，能傾聽並確認理解。","依對象調整語氣方式，協助建立共識與合作。","跨部門清晰表達觀點，影響他人並維護形象。"] },
            { name: "創新能力", levels: ["抗拒改變", "被動接受", "穩定嘗試", "主動創新", "引領創新"], descs: ["拒絕新做法，傾向維持現狀或否定他人創意。","願意嘗試但缺乏主動觀察；需指導才能執行。","配合新流程，並在指導下提出小幅優化。","獨立觀察問題、提出新做法並追蹤結果，積極改善。","發展創新專案或制度，推動團隊建立優化文化。"] }
        ];

        const S3_BARS_MGMT = [
            { name: "策略性思考", levels: ["僅執行命令 / 缺乏全局觀", "理解指令 / 缺乏分析", "基本分析 / 連結目標", "前瞻規劃 / 主動提案", "組織引領 / 策略制定"], descs: ["只關注自身任務，不理解組織方向；缺乏思考長期影響。","能理解策略但無法轉化行動；僅依他人決策行動。","能分析資料、理解願景並與部門任務連結。","能發現趨勢或問題，提出可行策略建議並落實。","能設計策略地圖、影響決策並推動長期發展。"] },
            { name: "人才發展", levels: ["無學習動機 / 忽視他人", "被動學習 / 有限支持", "穩定學習 / 願意分享", "主動培育 / 指導他人", "系統傳承 / 文化引導"], descs: ["對自身或他人發展無興趣，不參與訓練也不支持學習。","僅完成要求的培訓，偶爾給予同事建議但缺乏持續追蹤。","能自我成長並主動協助新進同事適應任務。","能計畫學習方向、提供具體回饋，帶領同儕進步。","能設計培訓制度、建立導師文化，推動組織人才成長。"] },
            { name: "文化落實與價值傳遞", levels: ["不認同 / 違反價值", "被動參與 / 理解不足", "穩定實踐 / 態度正向", "主動傳遞 / 影響同儕", "文化引領 / 價值代言"], descs: ["行為與組織價值相悖，對文化活動冷漠或抵制。","表面配合但缺乏實際行動，僅在被要求時參與。","認同價值觀並在工作中展現，能主動參與文化活動。","以行動影響他人、推動文化活動，展現正向力量。","能建立文化制度、引領團隊內化價值並對外傳遞品牌信念。"] }
        ];

        let state = {
            level: 1, s1: { exp: [0], mot: [0,0], sty: [0,0], sal: [0,0,0], bon: [0] },
            s2: Array(S2_QUESTIONS.length).fill(0), s3: { core: Array(6).fill(0), mgmt: Array(3).fill(0) }
        };

        window.onload = () => {
            document.getElementById('interview-date').value = new Date().toISOString().split('T')[0];
            updateDateTimeDisplay();
            const saved = localStorage.getItem('interviewDraft');
            if(saved) { state = JSON.parse(saved); document.getElementById('job-level-select').value = state.level; }
            renderS1(); renderS2(); renderS3(); calculateScores();
        };

        function renderS1() {
            S1_DATA.forEach(group => {
                const container = document.getElementById(`s1-${group.id}-section`);
                let html = `<div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-3"><div class="flex justify-between border-b-2 border-slate-100 pb-2"><h3 class="font-bold">${group.title}</h3></div><div class="space-y-2 mt-2">`;
                group.qs.forEach((q, i) => {
                    html += `<div class="bg-slate-50 p-2 rounded flex justify-between items-center"><div class="text-sm flex-1">${q}</div><div class="flex gap-1">`;
                    [1,2,3,4,5].map(v => {
                        const isActive = state.s1[group.id][i] == v;
                        html += `<button onclick="setScore('s1-${group.id}', ${i}, ${v}, this)" class="score-btn s1-s2-btn w-8 h-8 rounded text-sm font-bold ${isActive?'active':''}" data-val="${v}">
                            <span class="btn-num">${v}</span><span class="report-label">${GRADE_LABELS[v]}</span>
                        </button>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html + `</div>`;
            });
        }

        function renderS2() {
            const container = document.getElementById('s2-container');
            container.innerHTML = S2_QUESTIONS.map((q, i) => {
                let btns = [1,2,3,4,5].map(v => {
                    const isActive = state.s2[i] == v;
                    return `<button onclick="setScore('s2', ${i}, ${v}, this)" class="score-btn s1-s2-btn w-8 h-8 rounded text-xs font-bold ${isActive?'active':''}" data-val="${v}">
                        <span class="btn-num">${v}</span><span class="report-label">${GRADE_LABELS[v]}</span>
                    </button>`;
                }).join('');
                return `<div class="flex justify-between items-center border-b border-slate-100 py-2 px-1"><span class="text-sm">${i+1}. ${q}</span><div class="flex gap-1">${btns}</div></div>`;
            }).join('');
        }

        function renderS3() {
            const tbody = document.getElementById('s3-tbody');
            const d = S3_LEVELS[state.level];
            let html = '';
            
            S3_BARS_CORE.forEach((item, i) => {
                html += `<tr class="border-b border-slate-200"><td class="p-2 border-r bg-blue-50 font-bold text-center text-sm">核心<br><span class="text-xs text-blue-600">(${d.c[i]}%)</span></td><td class="p-2 border-r font-bold text-sm text-center">${item.name}</td><td class="bg-blue-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="bg-indigo-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="bg-indigo-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="bg-indigo-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="p-2 text-center"><div class="flex gap-1 justify-center">`;
                [1,2,3,4,5].map(v => {
                    const isActive = state.s3.core[i] == v;
                    html += `<button onclick="setScore('s3-core', ${i}, ${v}, this)" class="score-btn w-7 h-7 rounded text-xs font-bold ${isActive?'active':''}" data-val="${v}">${v}<span class="tooltip-text">${item.levels[v-1]}</span></button>`;
                });
                html += `</div></td></tr>`;
                const desc = state.s3.core[i] > 0 ? item.descs[state.s3.core[i]-1] : '';
                html += `<tr id="desc-core-${i}" class="bg-slate-50 text-xs text-slate-600 ${state.s3.core[i]>0?'':'hidden'}"><td colspan="7" class="p-2 border-b"><span class="font-bold text-blue-700">行為描述：</span> <span id="desc-text-core-${i}">${desc}</span></td></tr>`;
            });

            S3_BARS_MGMT.forEach((item, i) => {
                html += `<tr class="border-b border-slate-200"><td class="p-2 border-r bg-green-50 font-bold text-center text-sm">管理<br><span class="text-xs text-green-600">(${d.m[i]}%)</span></td><td class="p-2 border-r font-bold text-sm text-center">${item.name}</td><td class="bg-blue-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="bg-indigo-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="bg-indigo-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="bg-indigo-50/10 p-1 border-r"><textarea class="input-cell" rows="1"></textarea></td><td class="p-2 text-center"><div class="flex gap-1 justify-center">`;
                [1,2,3,4,5].map(v => {
                    const isActive = state.s3.mgmt[i] == v;
                    html += `<button onclick="setScore('s3-mgmt', ${i}, ${v}, this)" class="score-btn w-7 h-7 rounded text-xs font-bold ${isActive?'active':''}" data-val="${v}">${v}<span class="tooltip-text">${item.levels[v-1]}</span></button>`;
                });
                html += `</div></td></tr>`;
                const desc = state.s3.mgmt[i] > 0 ? item.descs[state.s3.mgmt[i]-1] : '';
                html += `<tr id="desc-mgmt-${i}" class="bg-slate-50 text-xs text-slate-600 ${state.s3.mgmt[i]>0?'':'hidden'}"><td colspan="7" class="p-2 border-b"><span class="font-bold text-green-700">行為描述：</span> <span id="desc-text-mgmt-${i}">${desc}</span></td></tr>`;
            });
            tbody.innerHTML = html;
        }

        function updateLevelLogic() { state.level = parseInt(document.getElementById('job-level-select').value); renderS3(); calculateScores(); }

        window.setScore = function(group, idx, val, btn) {
            Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(group === 's2') state.s2[idx] = val;
            else if(group.startsWith('s1-')) state.s1[group.split('-')[1]][idx] = val;
            else if(group.startsWith('s3-')) {
                const type = group.split('-')[1];
                state.s3[type][idx] = val;
                const BARS = type === 'core' ? S3_BARS_CORE : S3_BARS_MGMT;
                document.getElementById(`desc-${type}-${idx}`).classList.remove('hidden');
                document.getElementById(`desc-text-${type}-${idx}`).innerText = BARS[idx].descs[val-1];
            }
            calculateScores();
        }

        function setFinalDecision(type) {
            document.getElementById('btn-pass').className = 'decision-btn flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl font-black hover:bg-slate-600';
            document.getElementById('btn-fail').className = 'decision-btn flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl font-black hover:bg-slate-600';
            if(type==='pass') document.getElementById('btn-pass').classList.add('active-pass');
            if(type==='fail') document.getElementById('btn-fail').classList.add('active-fail');
        }

        function calculateScores() {
            const sumArr = arr => arr.reduce((a,b)=>a+b, 0);

            let s1PctTotal = 0, s1RawTotal = 0, motScore = 0; 
            S1_DATA.forEach(g => {
                const raw = sumArr(state.s1[g.id]); s1RawTotal += raw;
                if(g.id === 'mot') motScore = raw;
                s1PctTotal += raw > 0 ? (raw/g.max)*100*g.weight : 0;
            });
            const s1Final = (s1PctTotal/100)*30; document.getElementById('s1-final').innerText = s1Final.toFixed(2);

            const s2Raw = sumArr(state.s2);
            const s2Final = (s2Raw > 0 ? (s2Raw/85)*100 : 0) * 0.10;
            document.getElementById('s2-final').innerText = s2Final.toFixed(2);

            const d = S3_LEVELS[state.level];
            let coreScore = 0, mgmtScore = 0;
            state.s3.core.forEach((v,i) => coreScore += v*(d.c[i]/100));
            state.s3.mgmt.forEach((v,i) => mgmtScore += v*(d.m[i]/100));
            const s3Final = (((coreScore/5)*100*(d.ratio.c/100)) + ((mgmtScore/5)*100*(d.ratio.m/100))) * 0.60;
            document.getElementById('s3-final').innerText = s3Final.toFixed(2);

            const grandTotal = s1Final + s2Final + s3Final;
            document.getElementById('header-total').innerText = grandTotal.toFixed(2);
            document.getElementById('report-grand-total').innerText = grandTotal.toFixed(2);
            document.getElementById('footer-total').innerText = grandTotal.toFixed(2);

            if(grandTotal === 0) return;

            let finalStatusIndex = 5, baseDesc = "";
            if (grandTotal >= 90) { finalStatusIndex = 0; baseDesc = "面試與筆試表現皆出色，具高度文化契合度與執行潛力。"; }
            else if (grandTotal >= 80) { finalStatusIndex = 1; baseDesc = "穩定且具培育潛力，文化契合良好，能快速上線。"; }
            else if (grandTotal >= 70) { finalStatusIndex = 2; baseDesc = "職能或筆試略有不足，但態度正向、文化契合度高。"; }
            else if (grandTotal >= 60) { finalStatusIndex = 3; baseDesc = "能力或穩定度不足，需進一步觀察。"; }
            else if (grandTotal >= 50) { finalStatusIndex = 5; baseDesc = "未達職能與文化基準，需大量培訓或文化落差大。"; }
            else { finalStatusIndex = 5; baseDesc = "明顯不符核心職能與價值觀。"; }

            let vetoReasons = [], vetoHints = [];
            
            if (s1RawTotal > 0 && s1RawTotal < 30) {
                vetoReasons.push("筆試總分 < 30分");
                vetoHints.push("確認該低分項目未來是否有機會提高分數？方法？");
                finalStatusIndex = Math.max(finalStatusIndex, 2);
            }
            if (motScore > 0 && motScore < 7) {
                vetoReasons.push("動機與價值觀 < 7分");
                vetoHints.push("在初衷上需要對頻更多，需提出解決辦法。");
                finalStatusIndex = Math.max(finalStatusIndex, 4);
            }
            if (s2Raw > 0 && s2Final < 7) {
                vetoReasons.push("外顯特質得分率 < 70%");
                vetoHints.push("找出外顯特質低於3分的內容確認日後是否可訓練。");
                finalStatusIndex = Math.max(finalStatusIndex, 4);
            }
            let lowCoreNames = [];
            state.s3.core.forEach((v, i) => { if(v===1) lowCoreNames.push(S3_BARS_CORE[i].name); });
            if (lowCoreNames.length > 0) {
                vetoReasons.push(`${lowCoreNames.join('、')} 低於2分`);
                vetoHints.push("補充培訓（1~3月）計劃提高職能分數。");
                finalStatusIndex = Math.max(finalStatusIndex, 2);
            }

            const STATUS = ["優先錄取", "建議錄取", "可培養 / 備取", "條件式錄取（限缺時）", "不建議錄取", "不錄取"];
            const statusDiv = document.getElementById('ideal-status-text');
            const expDiv = document.getElementById('ideal-status-exp');
            const hintArea = document.getElementById('bonus-hint-area');
            const inputArea = document.getElementById('bonus-method-input');

            statusDiv.innerText = STATUS[finalStatusIndex];
            statusDiv.className = `text-2xl font-black mb-4 ${finalStatusIndex<=1?'text-emerald-400':(finalStatusIndex<=3?'text-amber-400':'text-red-400')}`;

            if(vetoReasons.length > 0) {
                expDiv.innerHTML = `<span class="text-red-400 font-bold">⚠️ 降級原因：</span> ${vetoReasons.join('、')}。`;
                hintArea.innerHTML = "💡 系統加分提示：<br>• " + vetoHints.join('<br>• ');
                hintArea.classList.remove('hidden');
                inputArea.classList.remove('rounded-t-lg');
            } else {
                let rangeText = grandTotal>=90?"90~100分":grandTotal>=80?"80~89分":grandTotal>=70?"70~79分":grandTotal>=60?"60~69分":grandTotal>=50?"50~59分":"小於50分";
                expDiv.innerHTML = `<span class="text-blue-300 font-bold">${grandTotal.toFixed(2)}分</span> 落在 ${rangeText} 級距，${baseDesc}`;
                hintArea.classList.add('hidden');
                inputArea.classList.add('rounded-t-lg');
            }
        }
    </script>
</body>
</html>
